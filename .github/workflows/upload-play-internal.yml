name: Upload AAB to Play Console (internal)

# リリース PR が main にマージされ、pubspec.yaml のバージョンが変わったときだけ走る。
# main への push でも pubspec.yaml が変わっていなければスキップされる
# （同じ versionCode の AAB を再アップロードすると Play が 409 で弾くため）。
on:
  push:
    branches: [main]
    paths:
      - pubspec.yaml
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 署名鍵と Firebase 設定はリポジトリに含めていない（.gitignore 済み）ため
      # Secrets から復元する。ジョブ終了時に必ず消す（下の cleanup ステップ）。
      - name: 署名鍵・Firebase 設定を復元
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/android/app/upload-key.jks"
          printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON" > "$GITHUB_WORKSPACE/android/app/google-services.json"
          cat > "$GITHUB_WORKSPACE/android/key.properties" <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=$GITHUB_WORKSPACE/android/app/upload-key.jks
          EOF

      - name: バージョンを取得
        id: version
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version: *\([0-9.]*\)+.*$/\1/p' pubspec.yaml)"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - run: flutter pub get
      - run: flutter build appbundle --release

      - name: Play Console（内部テスト）へアップロード
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.kansuke.kansuke
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          releaseName: ${{ steps.version.outputs.version }}

      - name: 秘密ファイルを削除
        if: always()
        run: rm -f android/app/upload-key.jks android/key.properties android/app/google-services.json
