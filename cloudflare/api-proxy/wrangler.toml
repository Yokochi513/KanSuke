name = "kansuke-api-proxy"
main = "src/index.js"
compatibility_date = "2026-07-01"

# api.dreamyard.cc が、外部に公開する唯一の API URL。
# `zone_name` は Cloudflare に登録済みのゾーン（ドメイン）名。
# 変更する場合は docs/api.md のベース URL も同じ値に合わせること。
routes = [
  { pattern = "api.dreamyard.cc/*", zone_name = "dreamyard.cc" }
]

# シークレットは wrangler.toml には書かない（コミットされるため）。
# デプロイ前に一度だけ:
#   npx wrangler secret put API_PROXY_KEY
# ローカル開発（npx wrangler dev）では .dev.vars を使う（.gitignore 済み）。
