name = "kansuke-api-proxy"
main = "src/index.js"
compatibility_date = "2026-07-01"

# ==== 独自ドメインの設定（デプロイ前に自分のドメインへ置き換える） ====
# `zone_name` は Cloudflare に登録済みのゾーン（ドメイン）名。
# `pattern` の api.<ドメイン> が、外部に公開する唯一の API URL になる。
# 置き換えるのはここだけ。docs/api.md のベース URL も同じ値に合わせること。
routes = [
  { pattern = "api.kansuke.example/*", zone_name = "kansuke.example" }
]

# シークレットは wrangler.toml には書かない（コミットされるため）。
# デプロイ前に一度だけ:
#   npx wrangler secret put API_PROXY_KEY
# ローカル開発（npx wrangler dev）では .dev.vars を使う（.gitignore 済み）。
